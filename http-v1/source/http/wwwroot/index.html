<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 C++ 项目主页</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 20px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);

        .status { color: green; font-weight: bold; }

    <div class="container">
        <h1>Hello, Muduo Server!</h1>

            <li><strong>模式:</strong> <span class="status">运行中 (Running)</span></li>

        </ul>

        <h3>快速链接</h3>
